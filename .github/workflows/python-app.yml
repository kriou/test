name: Cloud Build Python APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull third-party source code
        run: |
          git clone https://github.com/kriou/Box.git third_lib
          cd third_lib
          git checkout main

      # 仅补充pkg-config、libssl-dev，消除openssl pkg-config警告，无其他底层库
      - name: Install minimal pkg-config & ssl dev
        run: |
          sudo apt-get update -qqy
          sudo apt-get install -qqy pkg-config libssl-dev

      - name: Install Buildozer
        run: |
          python3 -m pip install --upgrade pip
          pip3 install buildozer

      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            ./bin
          key: ${{ runner.os }}-bz-${{ hashFiles('buildozer.spec') }}

      - name: Debug SDK status
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          echo "SDK Path: $SDK"
          ls -la $SDK/build-tools || echo "build-tools不存在"

      - name: Build APK debug
        env:
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"
        run: buildozer android debug --verbose --log-level 2

      - name: Upload compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Output-APK
          path: bin/*.apk
