name: Cloud Build Python APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取自身代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 拉取第三方代码文件夹 third_lib
      - name: Pull third-party source code
        run: |
          git clone https://github.com/kriou/Box.git third_lib
          cd third_lib
          git checkout main

      # 【已完整删除 apt-get 系统依赖安装步骤】

      # 4. 安装 Buildozer
      - name: Install Buildozer
        run: |
          python3 -m pip install --upgrade pip
          pip3 install buildozer

      # 5. 缓存SDK/NDK
      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            ./bin
          key: ${{ runner.os }}-bz-${{ hashFiles('buildozer.spec') }}

      # 调试打印SDK状态
      - name: Debug SDK status
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          echo "SDK Path: $SDK"
          ls -la $SDK/build-tools || echo "build-tools不存在"

      # 编译
      - name: Build APK debug
        env:
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"
        run: buildozer android debug --verbose --log-level 2

      - name: Upload compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Output-APK
          path: bin/*.apk
