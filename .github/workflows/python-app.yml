name: Cloud Build Python APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取自身代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 拉取第三方代码文件夹 third_lib
      - name: Pull third-party source code
        run: |
          git clone https://github.com/kriou/Box.git third_lib
          cd third_lib
          git checkout main

      # 3. 安装依赖并修复 libtinfo5
      - name: Install system dependencies & fix libtinfo5 missing
        run: |
          sudo apt-get update -qqy
          sudo apt-get install -qqy git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev
          wget -q https://mirrors.aliyun.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          wget -q https://mirrors.aliyun.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.3-2ubuntu0.1_amd64.deb
          wget -q https://mirrors.aliyun.com/ubuntu/pool/universe/n/ncurses/libncursesw5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_*.deb libncurses5_*.deb libncursesw5_*.deb
          sudo apt-get -f install -qqy
          sudo ldconfig
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Buildozer
        run: |
          python3 -m pip install --upgrade pip
          pip3 install buildozer

      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            ./bin
          key: ${{ runner.os }}-bz-${{ hashFiles('buildozer.spec') }}

      - name: Build APK with verbose log
        env:
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"
        run: buildozer android debug --verbose

      - name: Upload compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Output-APK
          path: bin/*.apk
