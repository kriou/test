name: Build Box Kivy Release APK
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  checks: read

env:
  TARGET_REPO: "https://github.com/kriou/Box.git"
  TARGET_BRANCH: "main"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_HOME: /usr/local/lib/android/sdk
  JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
  CYTHON_LANGUAGE_LEVEL: "3"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.java-home=$JAVA_HOME -Dorg.gradle.jvmargs=-Xmx2048m"
  BUILDOZER_ALLOW_PLATFORM_EXEC: 1
  USE_COLORS: 0

jobs:
  build-box-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Box repository
        run: |
          rm -rf ./*
          git clone -b ${{ env.TARGET_BRANCH }} ${{ env.TARGET_REPO }} ./
          echo "==== 拉取源码完成，目录文件 ===="
          ls -la

      # 新增：自动生成spec文件
      - name: Generate buildozer.spec automatically
        run: |
          cat > buildozer.spec << EOF

      - name: Cache Python & Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/bin
          key: box-py39-buildozer-cache

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: android-sdk-global

      - name: Setup Temurin Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      # 已移除libtinfo5，无包冲突
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip curl wget \
            autoconf automake libtool pkg-config cmake \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libltdl-dev

      - name: Install Buildozer / Kivy stack
        run: |
          python -m pip install --upgrade pip setuptools wheel --no-cache-dir
          # 使用清华镜像加速，避免国外源超时失败
          export PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
          export PIP_TRUSTED_HOST=pypi.tuna.tsinghua.edu.cn
          
          # 先单独装cython锁定版本
          pip install cython==0.29.33 --no-cache-dir
          # 再装buildozer
          pip install buildozer --no-cache-dir
          # 最后装kivy、kivymd
          pip install kivy kivymd --no-cache-dir
          
          # 项目依赖
          [ -f requirements.txt ] && pip install -r requirements.txt --no-cache-dir
          
          # 打印版本确认安装成功
          echo "=== 版本校验 ==="
          python -m cython --version
          buildozer --version
          python -c "import kivy;print('Kivy version:',kivy.__version__)"

      - name: Generate release keystore
        id: gen_keystore
        run: |
          KEY_NAME="box.app.release"
          if [ ! -f "${KEY_NAME}.keystore" ]; then
            echo "生成全新签名密钥..."
            keytool -genkey -v \
              -keystore ${KEY_NAME}.keystore \
              -alias ${KEY_NAME} \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Dev, OU=Dev, O=Dev, L=City, ST=State, C=CN"
            echo "KEY_CREATED=true" >> $GITHUB_OUTPUT
          else
            echo "复用已有密钥文件"
            echo "KEY_CREATED=false" >> $GITHUB_OUTPUT
          fi
          echo "KEYSTORE_FILE=$PWD/${KEY_NAME}.keystore" >> $GITHUB_ENV
          echo "KEY_ALIAS=${KEY_NAME}" >> $GITHUB_ENV

      - name: Build Android Release APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export P4A_RELEASE_KEYSTORE=${{ env.KEYSTORE_FILE }}
          export P4A_RELEASE_KEYALIAS=${{ env.KEY_ALIAS }}
          export P4A_RELEASE_KEYSTORE_PASSWD="android"
          export P4A_RELEASE_KEYALIAS_PASSWD="android"

          buildozer android clean
          buildozer -v android release --no-aab 2>&1 | tee box-build.log
          find . -name "*.apk" -exec cp {} ./ \; || true

      - name: Check compiled APK files
        id: verify_build
        run: |
          FILE_NUM=$(ls ./*.apk 2>/dev/null | wc -l)
          if [ "$FILE_NUM" -gt 0 ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
            ls -lh ./*.apk
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
            echo "未找到APK，请查看 box-build.log"
          fi

      - name: Upload APK Artifact
        if: steps.verify_build.outputs.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: Box-Kivy-Release-APK
          path: ./*.apk
          retention-days: 30

      - name: Upload generated keystore
        if: steps.gen_keystore.outputs.KEY_CREATED == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: Box-App-Keystore
          path: ${{ env.KEYSTORE_FILE }}
          retention-days: 1

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: Box-Build-Log
          path: box-build.log
          retention-days: 7
