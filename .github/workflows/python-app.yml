name: Cloud Build Python APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取自身代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 拉取第三方代码 third_lib
      - name: Pull third-party source code
        run: |
          git clone https://github.com/kriou/Box.git third_lib
          cd third_lib
          git checkout main

      # 4. 安装buildozer
      - name: Install Buildozer
        run: |
          python3 -m pip install --upgrade pip
          pip3 install buildozer

      # 5. 缓存SDK/NDK，避免重复下载
      - name: Cache buildozer env
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            ./bin
          key: ${{ runner.os }}-bz-${{ hashFiles('buildozer.spec') }}

      # 6. 打包，开启详细日志，限制Gradle内存防OOM
      - name: Build APK debug
        env:
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"
        run: buildozer android debug --verbose

      # 7. 上传APK产物
      - name: Upload compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Output-APK
          path: bin/*.apk
