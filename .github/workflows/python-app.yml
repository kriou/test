name: Build Box Kivy Release APK
on:
  workflow_dispatch: # 手动触发打包

permissions:
  contents: write
  actions: read
  checks: read

env:
  TARGET_REPO: "https://github.com/kriou/Box.git"
  TARGET_BRANCH: "main"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_HOME: /usr/local/lib/android/sdk
  JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
  CYTHON_LANGUAGE_LEVEL: "3"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.java-home=$JAVA_HOME -Dorg.gradle.jvmargs=-Xmx2048m"
  BUILDOZER_ALLOW_PLATFORM_EXEC: 1
  USE_COLORS: 0

jobs:
  build-box-apk:
    runs-on: ubuntu-latest
    steps:
      # 清空工作目录，拉取 kriou/Box 源码
      - name: Clone Box repository
        run: |
          rm -rf ./*
          git clone -b ${{ env.TARGET_BRANCH }} ${{ env.TARGET_REPO }} ./
          echo "==== 拉取源码完成，目录文件 ===="
          ls -la

      # 缓存SDK与Python依赖，大幅加速二次构建
      - name: Cache Python & Buildozer
        uses: actions/cache@v4.1.2
        with:
          path: |
            ~/.cache/pip
            ~/.local/bin
          key: box-py39-buildozer-cache

      - name: Cache Android SDK
        uses: actions/cache@v4.1.2
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: android-sdk-global

      # Java17 环境
      - name: Setup Temurin Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # Python3.9
      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 安装系统底层依赖（修复libtinfo5缺失报错）
      - name: Install system dependencies
        run: |
           sudo apt-get update -y
          # 增加jammy源用于安装libtinfo5
          echo "deb http://archive.ubuntu.com/ubuntu/ jammy main universe" | sudo tee /etc/apt/sources.list.d/jammy.list
          sudo apt update
          sudo apt-get install -y libtinfo5
          sudo apt-get install -y \
          git zip unzip curl wget \
          autoconf automake libtool pkg-config cmake \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libffi-dev libssl-dev libltdl-dev

      # 安装打包工具链
      - name: Install Buildozer / Kivy stack
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33 buildozer kivy kivymd
          # 如果项目有requirements.txt自动安装项目依赖
          [ -f requirements.txt ] && pip install -r requirements.txt

      # 自动生成签名密钥（测试用，正式请改用Secrets）
      - name: Generate release keystore
        id: gen_keystore
        run: |
          KEY_NAME="box.app.release"
          if [ ! -f "${KEY_NAME}.keystore" ]; then
            echo "生成全新签名密钥..."
            keytool -genkey -v \
              -keystore ${KEY_NAME}.keystore \
              -alias ${KEY_NAME} \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Dev, OU=Dev, O=Dev, L=City, ST=State, C=CN"
            echo "KEY_CREATED=true" >> $GITHUB_OUTPUT
          else
            echo "复用已有密钥文件"
            echo "KEY_CREATED=false" >> $GITHUB_OUTPUT
          fi
          # 导出签名环境变量
          echo "KEYSTORE_FILE=$PWD/${KEY_NAME}.keystore" >> $GITHUB_ENV
          echo "KEY_ALIAS=${KEY_NAME}" >> $GITHUB_ENV

      # Buildozer 编译 Release 签名APK
      - name: Build Android Release APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # p4a 签名环境变量
          export P4A_RELEASE_KEYSTORE=${{ env.KEYSTORE_FILE }}
          export P4A_RELEASE_KEYALIAS=${{ env.KEY_ALIAS }}
          export P4A_RELEASE_KEYSTORE_PASSWD="android"
          export P4A_RELEASE_KEYALIAS_PASSWD="android"

          # 清理旧构建缓存
          buildozer android clean
          # 执行打包并输出日志
          buildozer -v android release --no-aab 2>&1 | tee box-build.log

          # 复制所有apk/aab到根目录方便上传
          find . -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} ./ \; || true

      # 校验是否成功生成安装包
      - name: Check compiled APK files
        id: verify_build
        run: |
          FILE_NUM=$(ls ./*.apk ./*.aab 2>/dev/null | wc -l)
          if [ "$FILE_NUM" -gt 0 ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
            echo "已生成安装包列表："
            ls -lh ./*.apk ./*.aab
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
            echo "未找到APK，请查看 box-build.log 排查错误"
          fi

      # 上传成品APK到工作流产物
      - name: Upload APK Artifact
        if: steps.verify_build.outputs.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: Box-Kivy-Release-APK
          path: ./*.apk ./*.aab
          retention-days: 30

      # 首次生成密钥时上传密钥文件
      - name: Upload generated keystore
        if: steps.gen_keystore.outputs.KEY_CREATED == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: Box-App-Keystore
          path: ${{ env.KEYSTORE_FILE }}
          retention-days: 1

      # 无论成功失败都上传完整构建日志
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: Box-Build-Log
          path: box-build.log
          retention-days: 7
